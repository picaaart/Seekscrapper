name: Seek Scraper - Optimized Multi Category

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m playwright install chromium

    - name: Run optimized multi-category scraper
      run: |
        cd ${{ github.workspace }}
        python3 optimized_scraper.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/jobs_australia_current.csv data/scrape_cache.json 2>/dev/null || true
        git add data/jobs_australia_archive.csv 2>/dev/null || true
        git add data/company_stats.csv data/location_stats.csv data/category_stats.csv 2>/dev/null || true
        git add data/monthly_trends.json data/monthly_trends.csv 2>/dev/null || true
        git add data/jobs_australia_fifo_wa_details.csv 2>/dev/null || true
        git diff --quiet && git diff --staged --quiet || (git commit -m "⚡ Scrape + analytics + alerts: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && git push)
